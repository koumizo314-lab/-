        let userPos = null;

        // 営業判定ロジック
        function getBusinessStatus(shop, targetDate = new Date()) {
            const day = targetDate.getDay();
            const time = targetDate.getHours() * 100 + targetDate.getMinutes();
            let todaysSchedule = shop.hours[day];

            if (!todaysSchedule || todaysSchedule.length === 0) {
                return { label: "定休日", class: "status-closed", text: "本日はお休みです" };
            }

            // ["11:00", "15:00"] のような記述揺れを [["11:00", "15:00"]] に自動補正
            if (typeof todaysSchedule[0] === 'string') {
                todaysSchedule = [todaysSchedule];
            }

            let isOpen = false;
            let timeInfo = [];

            todaysSchedule.forEach(slot => {
                if (Array.isArray(slot) && slot.length === 2 && slot[0] && slot[1]) {
                    const start = parseInt(slot[0].replace(":", ""));
                    const end = parseInt(slot[1].replace(":", ""));
                    if (time >= start && time <= end) isOpen = true;
                    timeInfo.push(`${slot[0]}〜${slot[1]}`);
                }
            });

            if (timeInfo.length === 0) {
                return { label: "定休日", class: "status-closed", text: "本日はお休みです" };
            }

            return isOpen 
                ? { label: "営業中", class: "status-open", text: timeInfo.join(" / ") } 
                : { label: "準備中", class: "status-closed", text: timeInfo.join(" / ") };
        }

        // カード生成（Googleマップ・SNS・更新日 対応版）
        function createCard(shop, targetDate) {
            const status = getBusinessStatus(shop, targetDate);
            const isFav = favorites.includes(shop.id);
            const distance = userPos ? calculateDistance(userPos.lat, userPos.lng, shop.lat, shop.lng) : "---";
            
            // 【修正】Google Maps 公式の正確な検索用リンクを生成
            const mapUrl = (shop.lat && shop.lng) 
                ? `https://www.google.com/maps/search/?api=1&query=${shop.lat},${shop.lng}`
                : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.name + ' 南房総市')}`;

            // SNSアイコンの自動判定
            let snsIcon = "fa-hashtag";
            if (shop.sns) {
                if (shop.sns.includes("instagram.com")) snsIcon = "fa-instagram";
                else if (shop.sns.includes("twitter.com") || shop.sns.includes("x.com")) snsIcon = "fa-twitter";
                else if (shop.sns.includes("facebook.com")) snsIcon = "fa-facebook";
            }

            return `
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 hover:shadow-xl transition-all group flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="${status.class}">${status.label}</span>
                            
                            <div class="flex items-center gap-3 text-lg">
                                ${shop.website ? `<a href="${shop.website}" target="_blank" rel="noopener noreferrer" class="text-slate-300 hover:text-blue-500 transition-colors" title="公式サイトへ"><i class="fas fa-globe"></i></a>` : ''}
                                ${shop.sns ? `<a href="${shop.sns}" target="_blank" rel="noopener noreferrer" class="text-slate-300 hover:text-pink-500 transition-colors" title="SNSへ"><i class="fab ${snsIcon}"></i></a>` : ''}
                                <button onclick="toggleFavorite(${shop.id})" class="text-slate-300 hover:text-rose-500 transition-colors ml-1">
                                    <i class="fas fa-heart ${isFav ? 'favorite-active' : ''}"></i>
                                </button>
                            </div>
                        </div>
                        <div class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1">${shop.area} / ${shop.genre}</div>
                        
                        <a href="${mapUrl}" target="_blank" rel="noopener noreferrer" class="block">
                            <h3 class="text-xl font-black text-slate-800 mb-2 group-hover:text-blue-600 transition-colors">
                                ${shop.name} <i class="fas fa-external-link-alt text-xs opacity-0 group-hover:opacity-100 ml-1"></i>
                            </h3>
                        </a>

                        <div class="flex items-center text-slate-400 text-xs font-bold mb-4">
                            <i class="fas fa-map-marker-alt mr-1"></i>現在地から ${distance}km
                            <a href="${mapUrl}" target="_blank" rel="noopener noreferrer" class="ml-auto text-blue-500 hover:underline">
                                地図で見る <i class="fas fa-chevron-right ml-1"></i>
                            </a>
                        </div>
                    </div>
                    
                    <div class="bg-slate-50 rounded-2xl p-3 text-[11px] font-bold text-slate-500 mt-auto relative">
                        <i class="far fa-clock mr-1 text-blue-500"></i>${status.text}
                        ${shop.closedText ? `<div class="mt-1 text-[9px] text-slate-400">※ ${shop.closedText}</div>` : ''}
                        
                        ${shop.updatedAt ? `<div class="absolute bottom-3 right-3 text-[9px] text-slate-400 font-normal"><i class="fas fa-sync-alt mr-1"></i>情報更新: ${shop.updatedAt}</div>` : ''}
                    </div>
                </div>
            `;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
        }

        function render() {
            const area = document.getElementById('filter-area').value;
            const genre = document.getElementById('filter-genre').value;
            const search = document.getElementById('search-text').value.toLowerCase();
            const nowOpenOnly = document.getElementById('filter-now-open').checked;
            const customDate = document.getElementById('filter-datetime').value;
            const targetDate = customDate ? new Date(customDate) : new Date();

            const config = areaConfigs[area] || areaConfigs['all'];
            document.getElementById('area-visual').style.backgroundImage = `url('${config.img}')`;
            document.getElementById('current-area-jp').textContent = config.jp;
            document.getElementById('current-area-en').textContent = config.en;
            document.getElementById('area-description').textContent = config.desc;

            const filtered = shopList.filter(shop => {
                const status = getBusinessStatus(shop, targetDate);
                if (nowOpenOnly && status.label !== "営業中") return false;
                if (area !== 'all' && shop.area !== area) return false;
                if (genre !== 'all' && shop.genre !== genre) return false;
                if (search && !shop.name.toLowerCase().includes(search)) return false;
                if (showFavoritesOnly && !favorites.includes(shop.id)) return false;
                return true;
            });

            document.getElementById('shop-container').innerHTML = filtered.map(shop => createCard(shop, targetDate)).join('');
        }

        function toggleFavorite(id) {
            const idx = favorites.indexOf(id);
            if (idx > -1) favorites.splice(idx, 1); else favorites.push(id);
            localStorage.setItem('minamiboso_favs', JSON.stringify(favorites));
            render();
        }

        document.getElementById('show-favorites').addEventListener('click', (e) => {
            showFavoritesOnly = !showFavoritesOnly;
            e.target.classList.toggle('bg-rose-500');
            e.target.classList.toggle('text-white');
            render();
        });

        ['filter-area', 'filter-genre', 'search-text', 'filter-now-open', 'filter-datetime'].forEach(id => {
            document.getElementById(id).addEventListener('input', render);
        });

        setInterval(() => {
            document.getElementById('real-time-clock').textContent = new Date().toLocaleString('ja-JP');
        }, 1000);

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                render();
            });
        }

        render();
    </script>
</body>
</html>
