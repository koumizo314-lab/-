        let favorites = JSON.parse(localStorage.getItem('minamiboso_favs')) || [];
        let showFavoritesOnly = false;
        let userPos = null;

        // ==========================================
        // 地図表示のロジック
        // ==========================================
        let isMapView = false;
        let map = null;
        let markersGroup = null;

        // リストとマップを切り替える関数
        function toggleView() {
            isMapView = !isMapView;
            const shopContainer = document.getElementById('shop-container');
            const mapContainer = document.getElementById('map-container');
            const toggleBtn = document.getElementById('toggle-view-btn');

            if (isMapView) {
                shopContainer.classList.add('hidden');
                mapContainer.classList.remove('hidden');
                toggleBtn.innerHTML = '<i class="fas fa-th-large mr-1.5"></i>リストに戻す';
                toggleBtn.classList.replace('bg-blue-600', 'bg-slate-700');
                toggleBtn.classList.replace('hover:bg-blue-700', 'hover:bg-slate-800');
                
                if (!map) initMap();
                else map.invalidateSize(); // 表示切り替え時のバグ防止
            } else {
                shopContainer.classList.remove('hidden');
                mapContainer.classList.add('hidden');
                toggleBtn.innerHTML = '<i class="fas fa-map-marked-alt mr-1.5"></i>地図で見る';
                toggleBtn.classList.replace('bg-slate-700', 'bg-blue-600');
                toggleBtn.classList.replace('hover:bg-slate-800', 'hover:bg-blue-700');
            }
            render();
        }

        // 地図を初期化する関数
        function initMap() {
            // 南房総市周辺を初期表示
            map = L.map('map-container').setView([35.03, 139.9], 11);
            
            // 地図のデザインを読み込む（OpenStreetMap）
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            markersGroup = L.layerGroup().addTo(map);
        }

        // 地図にピンを立てる関数
        function updateMapMarkers(filteredShops, targetDate) {
            if (!map || !markersGroup) return;
            markersGroup.clearLayers(); // いったんピンを全部消す
            let bounds = []; // ピンが全部画面に収まるように枠を計算する用

            filteredShops.forEach(shop => {
                if (shop.lat && shop.lng) {
                    const status = getBusinessStatus(shop, targetDate);
                    // ピンを立てる
                    const marker = L.marker([shop.lat, shop.lng]).addTo(markersGroup);
                    
                    // ピンをクリックしたら詳細モーダルを開く
                    marker.on('click', () => { openModal(shop.id); });

                    // ピンにカーソルを合わせたら（スマホなら1回タップで）店名と営業状態を小さく出す
                    marker.bindTooltip(`<b>${shop.name}</b><br><span style="color:${status.label === '営業中' ? '#166534' : '#64748b'}">${status.label}</span>`);
                    bounds.push([shop.lat, shop.lng]);
                }
            });

            // 現在地が取得できていれば、赤い丸で現在地を表示する
            if (userPos) {
                 const userIcon = L.divIcon({
                     html: '<div style="width:14px;height:14px;background-color:#ef4444;border-radius:50%;border:2px solid white;box-shadow:0 0 4px rgba(0,0,0,0.5);"></div>',
                     className: '',
                     iconSize: [14, 14],
                     iconAnchor: [7, 7]
                 });
                 L.marker([userPos.lat, userPos.lng], {icon: userIcon}).addTo(markersGroup).bindTooltip("現在地");
                 bounds.push([userPos.lat, userPos.lng]);
            }

            // ピンが1つでもあれば、それが全部画面に収まるように自動ズームする
            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 });
            }
        }

        // 営業判定ロジック
        function getBusinessStatus(shop, targetDate = new Date()) {
            const day = targetDate.getDay();
            const time = targetDate.getHours() * 100 + targetDate.getMinutes();
            let todaysSchedule = shop.hours[day];

            if (!todaysSchedule || todaysSchedule.length === 0) {
                return { label: "定休日", class: "status-closed", text: "本日はお休みです" };
            }

            // ["11:00", "15:00"] のような記述揺れを [["11:00", "15:00"]] に自動補正
            if (typeof todaysSchedule[0] === 'string') {
                todaysSchedule = [todaysSchedule];
            }

            let isOpen = false;
            let timeInfo = [];

            todaysSchedule.forEach(slot => {
                if (Array.isArray(slot) && slot.length === 2 && slot[0] && slot[1]) {
                    const start = parseInt(slot[0].replace(":", ""));
                    const end = parseInt(slot[1].replace(":", ""));
                    if (time >= start && time <= end) isOpen = true;
                    timeInfo.push(`${slot[0]}〜${slot[1]}`);
                }
            });

            if (timeInfo.length === 0) {
                return { label: "定休日", class: "status-closed", text: "本日はお休みです" };
            }

            return isOpen 
                ? { label: "営業中", class: "status-open", text: timeInfo.join(" / ") } 
                : { label: "準備中", class: "status-closed", text: timeInfo.join(" / ") };
        }

        // ==========================================
        // カード生成（写真・動画対応版）
        // ==========================================
        function createCard(shop, targetDate) {
            const status = getBusinessStatus(shop, targetDate);
            const isFav = favorites.includes(shop.id);
            const distance = userPos ? calculateDistance(userPos.lat, userPos.lng, shop.lat, shop.lng) : "---";
            const mapLink = shop.mapUrl || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.name + ' 南房総市 ' + shop.area)}`;

            let snsIcon = "fa-hashtag";
            if (shop.sns) {
                if (shop.sns.includes("instagram.com")) snsIcon = "fa-instagram";
                else if (shop.sns.includes("twitter.com") || shop.sns.includes("x.com")) snsIcon = "fa-twitter";
                else if (shop.sns.includes("facebook.com")) snsIcon = "fa-facebook";
            }

            // ★画像・動画の出し分けロジック
            let mediaHtml = '';
            if (shop.video) {
                // 動画の場合は自動再生・ループ・消音で背景のように表示
                mediaHtml = `<video src="${shop.video}" autoplay loop muted playsinline class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"></video>`;
            } else if (shop.image) {
                // 画像の場合
                mediaHtml = `<img src="${shop.image}" alt="${shop.name}" loading="lazy" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">`;
            } else {
                // どちらもない場合のダミー画像（グレーの背景にアイコン）
                mediaHtml = `<div class="w-full h-full bg-slate-100 flex items-center justify-center text-slate-300 transition-transform duration-700 group-hover:scale-110"><i class="fas fa-camera text-3xl opacity-50"></i></div>`;
            }

            return `
                <div id="card-${shop.id}" onclick="openModal(${shop.id})" class="bg-white rounded-2xl shadow-sm border border-slate-200 hover:shadow-lg transition-all flex flex-col h-full cursor-pointer relative group overflow-hidden p-0">
                    
                    <div class="relative w-full h-28 sm:h-36 bg-slate-100 shrink-0 overflow-hidden">
                        ${mediaHtml}
                        <div class="absolute top-2 left-2 z-10">
                            <span class="${status.class} shadow-sm backdrop-blur-md bg-opacity-90">${status.label}</span>
                        </div>
                        <div class="absolute top-2 right-2 z-10">
                            <button onclick="event.stopPropagation(); toggleFavorite(${shop.id})" class="w-8 h-8 bg-white/80 backdrop-blur-sm rounded-full flex items-center justify-center text-slate-400 hover:text-rose-500 shadow-sm transition-colors">
                                <i class="fas fa-heart ${isFav ? 'favorite-active text-rose-500' : ''}"></i>
                            </button>
                        </div>
                    </div>

                    <div class="p-3 flex-grow flex flex-col">
                        <div class="flex justify-between items-center mb-1">
                            <div class="text-[9px] font-bold text-blue-500 truncate pr-2">${shop.area} / ${shop.genre}</div>
                            <div class="flex items-center gap-2 text-sm shrink-0 text-slate-400">
                                ${shop.website ? `<a href="${shop.website}" onclick="event.stopPropagation()" target="_blank" rel="noopener noreferrer" class="hover:text-blue-500 transition-colors"><i class="fas fa-globe"></i></a>` : ''}
                                ${shop.sns ? `<a href="${shop.sns}" onclick="event.stopPropagation()" target="_blank" rel="noopener noreferrer" class="hover:text-pink-500 transition-colors"><i class="fab ${snsIcon}"></i></a>` : ''}
                            </div>
                        </div>
                        
                        <h3 class="text-[13px] sm:text-sm font-black text-slate-800 leading-snug line-clamp-2 group-hover:text-blue-600 transition-colors mb-2 flex-grow">
                            ${shop.name}
                        </h3>

                        <div class="flex items-center justify-between text-slate-500 text-[10px] font-bold border-t border-slate-100 pt-2 mt-auto">
                            <span class="truncate"><i class="fas fa-map-marker-alt mr-0.5"></i>${distance}km</span>
                            <div class="flex items-center gap-1 text-slate-600 truncate">
                                <i class="far fa-clock text-blue-500"></i>
                                <span class="truncate max-w-[80px]">${status.text}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // モーダル（詳細画面）制御のロジック
        // ==========================================
        let activeCardId = null;

        function openModal(id) {
            activeCardId = id;
            const shop = shopList.find(s => s.id === id);
            if(!shop) return;

            const targetDate = document.getElementById('filter-datetime').value ? new Date(document.getElementById('filter-datetime').value) : new Date();
            const status = getBusinessStatus(shop, targetDate);
            const isFav = favorites.includes(shop.id);
            const distance = userPos ? calculateDistance(userPos.lat, userPos.lng, shop.lat, shop.lng) : "---";
            const mapLink = shop.mapUrl || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.name + ' 南房総市 ' + shop.area)}`;

            let snsIcon = "fa-hashtag";
            if (shop.sns) {
                if (shop.sns.includes("instagram.com")) snsIcon = "fa-instagram";
                else if (shop.sns.includes("twitter.com") || shop.sns.includes("x.com")) snsIcon = "fa-twitter";
                else if (shop.sns.includes("facebook.com")) snsIcon = "fa-facebook";
            }

            const descText = shop.description ? shop.description.replace(/\n/g, '<br>') : "店舗の詳細情報は準備中です。<br>情報が入り次第更新します！";

            // ★画像枠を大きく設定（スマホで画面高さの35%、PCで40%の領域を確保）
            let modalMediaHtml = '';
            const mediaClass = "w-full h-[35vh] sm:h-[40vh] object-cover";
            
            if (shop.video) {
                modalMediaHtml = `<video src="${shop.video}" controls autoplay loop muted playsinline class="${mediaClass}"></video>`;
            } else if (shop.image) {
                modalMediaHtml = `<img src="${shop.image}" alt="${shop.name}" class="${mediaClass}">`;
            } else {
                modalMediaHtml = `<div class="${mediaClass} bg-slate-100 flex flex-col items-center justify-center text-slate-300"><i class="fas fa-camera text-4xl mb-2 opacity-50"></i><span class="text-xs font-bold opacity-50">NO IMAGE</span></div>`;
            }

            const modalHtml = `
                <button onclick="closeModal()" class="absolute top-3 right-3 w-8 h-8 bg-black/50 backdrop-blur-sm rounded-full flex items-center justify-center text-white hover:bg-black/70 transition-colors z-20">
                    <i class="fas fa-times"></i>
                </button>

                <div class="relative w-full shrink-0 bg-slate-100">
                    ${modalMediaHtml}
                    <div class="absolute bottom-3 left-3 z-10">
                        <span class="shadow-md backdrop-blur-md bg-white/90 px-3 py-1.5 text-[11px] rounded-full text-slate-800 font-bold flex items-center gap-1.5">
                            <span class="w-2 h-2 rounded-full ${status.label === '営業中' ? 'bg-green-500 animate-pulse' : 'bg-slate-400'}"></span>
                            ${status.label}
                        </span>
                    </div>
                </div>

                <div class="p-5 sm:p-6 overflow-y-auto flex-grow bg-white">
                    
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1">${shop.area} / ${shop.genre}</div>
                            <h2 class="text-xl sm:text-2xl font-black text-slate-800 leading-tight">${shop.name}</h2>
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                            ${shop.website ? `<a href="${shop.website}" target="_blank" rel="noopener noreferrer" class="w-8 h-8 bg-slate-50 rounded-full flex items-center justify-center text-slate-500 hover:text-blue-500 hover:bg-blue-50 transition-colors"><i class="fas fa-globe"></i></a>` : ''}
                            ${shop.sns ? `<a href="${shop.sns}" target="_blank" rel="noopener noreferrer" class="w-8 h-8 bg-slate-50 rounded-full flex items-center justify-center text-slate-500 hover:text-pink-500 hover:bg-pink-50 transition-colors"><i class="fab ${snsIcon}"></i></a>` : ''}
                        </div>
                    </div>

                    <div class="text-xs text-slate-500 font-bold flex items-center mb-5 pb-5 border-b border-slate-100">
                        <i class="fas fa-map-marker-alt mr-1.5 text-slate-400"></i>現在地から ${distance}km
                    </div>

                    <div class="mb-5">
                        <p class="text-[13px] sm:text-sm text-slate-700 leading-relaxed">${descText}</p>
                    </div>

                    <div class="bg-slate-50 rounded-2xl p-4 mb-5">
                        <div class="text-[10px] sm:text-xs font-bold text-slate-500 mb-1 flex items-center">
                            <i class="far fa-clock mr-1.5 text-blue-500"></i>営業時間
                        </div>
                        <div class="text-[13px] sm:text-sm font-bold text-slate-800 ml-5">${status.text}</div>
                        ${shop.closedText ? `<div class="mt-1.5 text-[11px] text-rose-500 font-bold ml-5">定休日：${shop.closedText}</div>` : ''}
                    </div>

                    <div class="grid grid-cols-2 gap-3 mt-2">
                        <a href="${mapLink}" target="_blank" rel="noopener noreferrer" class="bg-blue-600 hover:bg-blue-700 text-white text-center py-3.5 rounded-xl font-bold text-[13px] transition-colors flex items-center justify-center gap-2 shadow-sm">
                            <i class="fas fa-map-marked-alt"></i>地図を開く
                        </a>
                        <button onclick="toggleFavorite(${shop.id}); updateModalFavorite(${shop.id})" class="bg-slate-100 hover:bg-rose-50 text-slate-700 text-center py-3.5 rounded-xl font-bold text-[13px] transition-colors flex items-center justify-center gap-2">
                            <i id="modal-fav-icon" class="fas fa-heart ${isFav ? 'favorite-active text-rose-500' : ''}"></i>保存する
                        </button>
                    </div>
                    
                    ${shop.updatedAt ? `<div class="mt-6 pt-4 text-[9px] text-slate-400 text-center border-t border-slate-50"><i class="fas fa-sync-alt mr-1"></i>情報更新: ${shop.updatedAt}</div>` : ''}
                </div>
            `;

            const modalContent = document.getElementById('shop-modal-content');
            modalContent.innerHTML = modalHtml;
            
            const modal = document.getElementById('shop-modal');
            const cardElement = document.getElementById(`card-${id}`);
            
            modalContent.style.transition = 'none';
            modalContent.style.opacity = '0';
            modalContent.style.transform = 'none';
            modal.classList.remove('hidden');
            
            if (cardElement) {
                const cardRect = cardElement.getBoundingClientRect();
                const modalRect = modalContent.getBoundingClientRect();
                const scaleX = cardRect.width / modalRect.width;
                const scaleY = cardRect.height / modalRect.height;
                const translateX = cardRect.left + cardRect.width / 2 - (modalRect.left + modalRect.width / 2);
                const translateY = cardRect.top + cardRect.height / 2 - (modalRect.top + modalRect.height / 2);

                modalContent.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scaleX}, ${scaleY})`;
            } else {
                modalContent.style.transform = 'scale(0.9)';
            }
            
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    modal.classList.remove('opacity-0');
                    modalContent.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease';
                    modalContent.style.transform = 'translate(0, 0) scale(1)';
                    modalContent.style.opacity = '1';
                });
            });
            
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            if (!activeCardId) return;
            const modal = document.getElementById('shop-modal');
            const modalContent = document.getElementById('shop-modal-content');
            const cardElement = document.getElementById(`card-${activeCardId}`);
            
            if (cardElement) {
                const cardRect = cardElement.getBoundingClientRect();
                const modalRect = modalContent.getBoundingClientRect();
                const scaleX = cardRect.width / modalRect.width;
                const scaleY = cardRect.height / modalRect.height;
                const translateX = cardRect.left + cardRect.width / 2 - (modalRect.left + modalRect.width / 2);
                const translateY = cardRect.top + cardRect.height / 2 - (modalRect.top + modalRect.height / 2);
                
                modalContent.style.transition = 'transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease';
                modalContent.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scaleX}, ${scaleY})`;
                modalContent.style.opacity = '0';
            } else {
                modalContent.style.transform = 'scale(0.9)';
                modalContent.style.opacity = '0';
            }
            
            modal.classList.add('opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modalContent.style.transition = 'none';
                if(window.innerWidth < 1024) {
                    document.body.style.overflow = '';
                }
                activeCardId = null;
            }, 400);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('shop-modal');
            if (event.target === modal) closeModal();
        }

        function updateModalFavorite(id) {
            const icon = document.getElementById('modal-fav-icon');
            if(icon) {
                if(favorites.includes(id)) {
                    icon.classList.add('favorite-active');
                    icon.classList.add('text-rose-500');
                } else {
                    icon.classList.remove('favorite-active');
                    icon.classList.remove('text-rose-500');
                }
            }
        }

        // 距離計算
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
        }

        // 描画・フィルタリング・並び替え
        function render() {
            const area = document.getElementById('filter-area').value;
            const genre = document.getElementById('filter-genre').value;
            const search = document.getElementById('search-text').value.toLowerCase();
            const nowOpenOnly = document.getElementById('filter-now-open').checked;
            const customDate = document.getElementById('filter-datetime').value;
            const targetDate = customDate ? new Date(customDate) : new Date();

            const config = areaConfigs[area] || areaConfigs['all'];
            document.getElementById('area-visual').style.backgroundImage = `url('${config.img}')`;
            document.getElementById('current-area-jp').textContent = config.jp;
            document.getElementById('current-area-en').textContent = config.en;
            document.getElementById('area-description').textContent = config.desc;

            const filtered = shopList.filter(shop => {
                const status = getBusinessStatus(shop, targetDate);
                if (nowOpenOnly && status.label !== "営業中") return false;
                if (area !== 'all' && shop.area !== area) return false;
                if (genre !== 'all' && shop.genre !== genre) return false;
                if (search && !shop.name.toLowerCase().includes(search)) return false;
                if (showFavoritesOnly && !favorites.includes(shop.id)) return false;
                
                shop._tempIsOpen = status.label === "営業中" ? 1 : 0;
                shop._tempDistance = userPos ? parseFloat(calculateDistance(userPos.lat, userPos.lng, shop.lat, shop.lng)) : Infinity;
                if (isNaN(shop._tempDistance)) shop._tempDistance = Infinity;

                return true;
            });

            filtered.sort((a, b) => {
                if (a._tempIsOpen !== b._tempIsOpen) return b._tempIsOpen - a._tempIsOpen; 
                if (a._tempDistance !== b._tempDistance) return a._tempDistance - b._tempDistance;
                return a.id - b.id;
            });

            // ★ここから変更：マップモードとリストモードで処理を分ける
            if (isMapView) {
                // マップ表示の場合：ピンを立て直す
                updateMapMarkers(filtered, targetDate);
            } else {
                // リスト表示の場合：カードを作り直す
                if (filtered.length === 0) {
                    document.getElementById('shop-container').innerHTML = `
                        <div class="col-span-full py-12 text-center text-slate-500">
                            <i class="far fa-frown-open text-4xl mb-3 text-slate-300"></i>
                            <p class="text-sm font-bold">ご指定の条件で現在開いているお店は見つかりませんでした。</p>
                            <p class="text-xs mt-2">条件を変えるか、「営業中のみ」のチェックを外してみてください。</p>
                        </div>
                    `;
                } else {
                    document.getElementById('shop-container').innerHTML = filtered.map(shop => createCard(shop, targetDate)).join('');
                }
            }
        }

        function toggleFavorite(id) {
            const idx = favorites.indexOf(id);
            if (idx > -1) favorites.splice(idx, 1); else favorites.push(id);
            localStorage.setItem('minamiboso_favs', JSON.stringify(favorites));
            render();
        }

        document.getElementById('show-favorites').addEventListener('click', (e) => {
            showFavoritesOnly = !showFavoritesOnly;
            e.target.classList.toggle('bg-rose-500');
            e.target.classList.toggle('text-white');
            render();
        });

        ['filter-area', 'filter-genre', 'search-text', 'filter-now-open', 'filter-datetime'].forEach(id => {
            document.getElementById(id).addEventListener('input', render);
        });

        setInterval(() => {
            document.getElementById('real-time-clock').textContent = new Date().toLocaleString('ja-JP');
        }, 1000);

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                render();
            });
        }

        render();

        
    </script>
    
    <div id="shop-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div id="shop-modal-content" class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            </div>
    </div>
    
    <a href="https://docs.google.com/forms/d/1GdzNqpJJ8SVIpX6kvPB0mphtrAOaGQVnDeVRkY4_A3c/edit" target="_blank" rel="noopener noreferrer" 
       class="fixed bottom-6 right-6 lg:bottom-10 lg:right-10 bg-slate-800 text-white px-4 py-3 sm:px-5 sm:py-3.5 rounded-full shadow-2xl hover:bg-blue-600 hover:-translate-y-1 transition-all duration-300 z-50 flex items-center gap-2 font-bold group border-2 border-white/20">
        <i class="fas fa-comment-dots text-lg group-hover:animate-bounce"></i>
        <span class="text-xs sm:text-sm tracking-wide">情報提供・ご要望</span>
    </a>
</body>
</html>
